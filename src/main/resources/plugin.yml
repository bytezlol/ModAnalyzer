name: ModAnalyzer
version: '1.0'
main: wtf.bytez.ModAnalyzer
api-version: '1.21'
authors: [ Bytezlol ]
website: bytez.wtf

permissions:
  detection.admin:
    description: Receive alerts when a player is detected using illegal mods.
    default: op
  detection.bypass:
    description: Bypass mod detection entirely.
    default: false